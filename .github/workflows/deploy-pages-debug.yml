name: Debug Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-debug-deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Show env and repo info
        run: |
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_SHA=$GITHUB_SHA"
          node -v
          npm -v
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: List `dist` contents and sizes
        run: |
          echo "dist exists: $( [ -d dist ] && echo yes || echo no )"
          du -sh dist || true
          ls -la dist || true
          echo "Top 20 files by size:" 
          find dist -type f -printf '%s %p\n' | sort -nr | head -n 20 || true
      - name: Show built index.html
        run: |
          echo '--- index.html ---'
          sed -n '1,200p' dist/index.html || true
      - uses: actions/configure-pages@v3
      - name: Upload artifact (debug)
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./dist
      - name: Deploy to Pages (debug)
        uses: actions/deploy-pages@v1
